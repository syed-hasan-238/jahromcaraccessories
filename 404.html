<style>
.err-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
  position: relative;
  overflow: hidden;
}

/* Huge 404 watermark */
.err-bg-num {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--fd);
  font-size: clamp(200px, 35vw, 500px);
  color: rgba(196,154,56,.04);
  letter-spacing: -.02em;
  line-height: 1;
  pointer-events: none;
  user-select: none;
  white-space: nowrap;
}

/* Animated particles canvas */
#err-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.err-content {
  position: relative;
  z-index: 2;
  max-width: 560px;
}

.err-tag {
  font-family: var(--fu);
  font-size: 10px;
  letter-spacing: .38em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.err-tag::before,
.err-tag::after {
  content: '';
  width: 32px;
  height: 1px;
  background: var(--gold);
  opacity: .5;
}

.err-h1 {
  font-family: var(--fd);
  font-size: clamp(72px, 14vw, 180px);
  line-height: .88;
  letter-spacing: .04em;
  color: var(--white);
  margin-bottom: 8px;
}

.err-h1 .g { color: var(--gold); }
.err-h1 .s {
  display: block;
  -webkit-text-stroke: 1px rgba(237,236,231,.15);
  color: transparent;
  font-size: 55%;
  letter-spacing: .08em;
}

.err-sub {
  font-size: 14px;
  font-weight: 300;
  color: var(--silver);
  line-height: 1.85;
  margin-top: 24px;
  margin-bottom: 44px;
  max-width: 420px;
  margin-left: auto;
  margin-right: auto;
}

.err-ctas {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

/* Decorative bracket corners */
.err-corner {
  position: absolute;
  width: 36px;
  height: 36px;
  pointer-events: none;
  z-index: 1;
}

.err-corner.tl { top: 52px; left: 52px; border-top: 1px solid rgba(196,154,56,.3); border-left: 1px solid rgba(196,154,56,.3); }
.err-corner.tr { top: 52px; right: 52px; border-top: 1px solid rgba(196,154,56,.3); border-right: 1px solid rgba(196,154,56,.3); }
.err-corner.bl { bottom: 52px; left: 52px; border-bottom: 1px solid rgba(196,154,56,.3); border-left: 1px solid rgba(196,154,56,.3); }
.err-corner.br { bottom: 52px; right: 52px; border-bottom: 1px solid rgba(196,154,56,.3); border-right: 1px solid rgba(196,154,56,.3); }

@media (max-width: 600px) {
  .err-corner { display: none; }
  .err-ctas { flex-direction: column; align-items: center; }
  .err-ctas .btn-g, .err-ctas .btn-o { width: 100%; justify-content: center; max-width: 300px; }
}

<script>
// Floating gold particles
(function() {
  const canvas = document.getElementById('err-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];
  function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize, { passive: true });
  for (let i = 0; i < 60; i++) {
    pts.push({
      x: Math.random(), y: Math.random(),
      s: Math.random() * 1.8 + 0.4,
      a: Math.random() * 0.25 + 0.05,
      vx: (Math.random() - 0.5) * 0.00015,
      vy: -Math.random() * 0.0002 - 0.00005
    });
  }
  (function animate() {
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, W, H);
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.y < -0.02) { p.y = 1.02; p.x = Math.random(); }
      if (p.x < -0.02 || p.x > 1.02) p.x = Math.random();
      ctx.beginPath();
      ctx.arc(p.x * W, p.y * H, p.s, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(196,154,56,${p.a})`;
      ctx.fill();
    });
  })();
})();
</script>
